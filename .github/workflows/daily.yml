name: US Stock AI Serverless Engine

on:
  schedule:
    # 11:30 AM UTC = 3:30 PM Dubai Time (Earnings Scan)
    - cron: '30 11 * * 1-5'
    # Hourly Technical Scan (11:25 UTC to 21:25 UTC = 3:25 PM to 1:25 AM Dubai Time)
    - cron: '25 11-21 * * 1-5'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scan Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: |
          current_hour=$(date -u +%H)
          if [ "$current_hour" == "14" ]; then
            echo "🚀 Launching Earnings Scan..."
            python main.py earnings
          else
            echo "🚀 Launching Technical Scan..."
            python main.py technical
          fi

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.csv || true
          git commit -m "Update scan results and market overview [skip ci]" || true
          git push
