name: US Stock AI Serverless Engine

on:
  schedule:
    # 1. Master List Refresh - Every Monday at 10:00 AM UTC (2:00 PM Dubai)
    - cron: '0 10 * * 1'
    
    # 2. Earnings Scan - Daily Mon-Fri at 11:30 AM UTC (3:30 PM Dubai)
    - cron: '30 11 * * 1-5'
    
    # 3. Technical Scan - Hourly Mon-Fri (12:25 PM to 8:25 PM UTC = 4:25 PM to 12:25 AM Dubai)
    - cron: '25 12-20 * * 1-5'
    
  workflow_dispatch:
    inputs:
      scan_mode:
        description: 'Choose Scan Mode'
        required: true
        default: 'technical'
        type: choice
        options:
          - technical
          - earnings
          - refresh

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Run Scan Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          # If manually triggered, use the selected mode
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "🚀 Launching Manual Scan Mode: ${{ github.event.inputs.scan_mode }}..."
            python main.py ${{ github.event.inputs.scan_mode }}
          elif [ "${{ github.event.schedule }}" == "0 10 * * 1" ]; then
            echo "🔄 Launching Weekly Master List Refresh..."
            python main.py refresh
          elif [ "${{ github.event.schedule }}" == "30 11 * * 1-5" ]; then
            echo "🚀 Launching Earnings Scan..."
            python main.py earnings
          else
            echo "🚀 Launching Technical Scan..."
            python main.py technical
          fi

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f *.csv || true
          git commit -m "Update scan results and market overview [skip ci]" || true
          git push origin master
